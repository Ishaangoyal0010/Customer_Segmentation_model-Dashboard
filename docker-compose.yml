version: '3.11'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: segmentation-backend
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: segmentation-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
